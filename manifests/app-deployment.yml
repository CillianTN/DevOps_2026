apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspnet-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aspnet-hello
  template:
    metadata:
      labels:
        app: aspnet-hello
    spec:
      containers:
      - name: app
        image: cilliann/devops-2026:1.0
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: aspnet-hello-service
spec:
  selector:
    app: aspnet-hello
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort